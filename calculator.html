<!DOCTYPE html>
<html>
<head>
<title>Yardage Calculator</title>
<style>
body{background:#0b0b0b;color:white;font-family:Arial;padding:40px;}
input{display:block;margin:10px 0;padding:10px;width:300px;}
button{background:#b30000;color:white;padding:10px;border:none;}
</style>
</head>

<body>

<h1>Yardage Calculator</h1>

<input id="l" placeholder="Length (ft)">
<input id="w" placeholder="Width (ft)">
<input id="d" placeholder="Depth (inches)">

<button onclick="calc()">Calculate</button>

<h2 id="out"></h2>

<script>
function calc(){
  let l=document.getElementById('l').value;
  let w=document.getElementById('w').value;
  let d=document.getElementById('d').value;

  let yards=(l*w*(d/12))/27;

  document.getElementById('out').innerText=
  "Cubic Yards: " + yards.toFixed(2);
}
</script>

</body>
</html>
